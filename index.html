<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>긴긴밤: 바다로 향하는 마지막 여정</title>
    <style>
        :root {
            --deep-navy: #0a192f;
            --charcoal-gray: #2d3436;
            --star-white: #ffffff;
            --accent-gold: #f1c40f;
            --text-light: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--deep-navy);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 별빛 배경 애니메이션 */
        .stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 게임 카드 레이아웃 */
        #game-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            background: rgba(45, 52, 54, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: opacity 0.6s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        /* 상단 프로그레스 바 */
        .progress-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-gold);
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--accent-gold);
        }

        /* 이미지 스타일 */
        .scene-image-container {
            width: 100%;
            height: 220px;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .scene-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .scene-image.loaded {
            opacity: 1;
        }

        /* 텍스트 영역 */
        #story-text {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 20px;
            min-height: 60px;
            word-break: keep-all;
        }

        #sub-text {
            font-size: 0.9rem;
            color: #bdc3c7;
            margin-bottom: 25px;
            font-style: italic;
        }

        /* 표지 전용 스타일 */
        .title-main {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-gold);
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .title-sub {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        /* 선택지 버튼 */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        button:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.2);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-gold);
        }

        .start-btn {
            background: var(--accent-gold);
            color: var(--deep-navy);
            font-weight: 700;
            border: none;
        }

        .start-btn:hover {
            background: #e1b100;
            color: var(--deep-navy);
        }

        /* 로딩 인디케이터 */
        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 엔딩 강조 텍스트 */
        .core-phrase {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent-gold);
            margin: 15px 0;
            display: block;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
        }

        @media (max-width: 400px) {
            #game-container { padding: 25px 20px; }
            #story-text { font-size: 1rem; }
            .scene-image-container { height: 180px; }
            .title-main { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="stars-container" id="stars"></div>

<div id="game-container">
    <div class="progress-wrapper" id="progress-wrapper">
        <div id="progress-bar"></div>
    </div>
    
    <div id="story-content">
        <div id="cover-section">
            <h1 class="title-main">긴긴밤</h1>
            <p class="title-sub">"바다로 향하는 마지막 여정"</p>
        </div>

        <div class="scene-image-container" id="img-container">
            <div class="loading-spinner" id="spinner"></div>
            <img id="scene-img" class="scene-image" alt="Scene Image">
        </div>

        <div id="story-text">지구상에 남은 마지막 흰바위코뿔소 노든,<br>그리고 이름 없는 아기 펭귄의 눈부신 여정.</div>
        <div id="sub-text">"나로 살기로 했다."</div>
        
        <div class="button-group" id="choices">
            <button class="start-btn" onclick="startGame()">여정 시작하기</button>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; 

    const storyData = {
        "start": {
            text: "전쟁터 같은 세상에 홀로 남겨진 알. 당신(노든)은 이 알을 어떻게 하시겠습니까?",
            sub: "세상의 마지막 코뿔소로서 당신의 선택은?",
            imagePrompt: "A single white egg glowing faintly in the middle of a dark, war-torn landscape, ruins in shadow, starry night sky, cinematic lighting, conceptual art style",
            choices: [
                { text: "알을 품고 끝까지 바다로 향한다", next: "step2" },
                { text: "너무 위험하니 안전한 곳에 두고 혼자 떠난다", next: "bad_ending_1" }
            ],
            progress: 15
        },
        "step2": {
            text: "길 위에서 지친 당신 앞에 치쿠와 앙가부의 냄새가 나는 양동이가 놓여 있습니다. 잠시 쉬어갈까요?",
            sub: "먼지가 쌓인 양동이에서 그리운 친구들의 온기가 느껴집니다.",
            imagePrompt: "An old, rusty metal bucket sitting on a dusty road under a vast blue night sky, glowing stars, nostalgic atmosphere, cinematic realism",
            choices: [
                { text: "친구들을 추억하며 잠시 숨을 돌린다", next: "step3_heal" },
                { text: "인간들이 쫓아오고 있으니 쉬지 않고 걷는다", next: "step3_tired" }
            ],
            progress: 35
        },
        "step3_heal": {
            text: "멀리서 서치라이트가 비칩니다. 어린 펭귄이 겁에 질려 떨고 있습니다. 어떻게 대처하시겠습니까?",
            sub: "(휴식 덕분에 몸이 가볍습니다)",
            imagePrompt: "A massive rhinoceros sheltering a tiny penguin under its giant shadow, harsh white searchlights in the distance at night, dramatic contrast",
            choices: [
                { text: "펭귄을 품에 숨기고 바위 뒤에 죽은 듯 엎드린다", next: "step4" },
                { text: "내가 미끼가 되어 반대 방향으로 뛰어간다", next: "step4_sacrifice" }
            ],
            progress: 55
        },
        "step3_tired": {
            text: "멀리서 서치라이트가 비칩니다. 어린 펭귄이 겁에 질려 떨고 있습니다. 어떻게 대처하시겠습니까?",
            sub: "(다리가 무겁고 숨이 차오릅니다)",
            imagePrompt: "A tired rhinoceros and a small penguin huddling together in the dark bushes, cold blue moonlit tones, cinematic lighting",
            choices: [
                { text: "펭귄을 품에 숨기고 바위 뒤에 죽은 듯 엎드린다", next: "step4" },
                { text: "내가 미끼가 되어 반대 방향으로 뛰어간다", next: "step4_sacrifice" }
            ],
            progress: 55
        },
        "step4": {
            text: "이제 저 언덕만 넘으면 바다입니다. 하지만 당신의 다리는 더 이상 움직이지 않습니다. 어린 펭귄에게 마지막으로 어떤 말을 남기겠습니까?",
            sub: "수평선 너머로 푸른 빛이 보이기 시작합니다.",
            imagePrompt: "A white rhinoceros lying down on a cliff looking at the distant sunrise over the deep blue sea, peaceful and emotional, artistic digital painting style",
            choices: [
                { text: "\"너는 이미 훌륭한 코뿔소야. 혼자서도 갈 수 있어.\"", next: "true_ending" },
                { text: "\"조금만 더 같이 가자. 나를 버리지 마.\"", next: "normal_ending" }
            ],
            progress: 80
        },
        "step4_sacrifice": {
            text: "당신은 미끼가 되어 절벽 끝까지 달렸습니다. 추격자들을 따돌렸지만, 이제 다시 돌아갈 힘이 없습니다. 펭귄에게 마지막 인사를 건넵니다.",
            sub: "당신의 희생으로 펭귄은 안전한 길을 찾았습니다.",
            imagePrompt: "A majestic rhinoceros silhouetted against a dramatic starry night cliffside, cinematic and heroic atmosphere",
            choices: [
                { text: "\"저 바다에 가면 내 몫까지 헤엄쳐 주렴.\"", next: "true_ending" }
            ],
            progress: 80
        },
        "bad_ending_1": {
            text: "홀로 남겨진 알은 결국 부화하지 못했습니다. 긴긴밤을 함께해 줄 누군가가 없었기 때문입니다.",
            sub: "여정이 여기서 멈췄습니다.",
            imagePrompt: "A small egg on cold dry earth, blue moonlight, somber and lonely atmosphere, minimal composition",
            choices: [{ text: "다시 시작하기", next: "startGame" }],
            progress: 100,
            isEnding: true
        },
        "normal_ending": {
            text: "함께 바다를 보았지만, 무리한 여정 끝에 당신의 숨이 멎습니다. 펭귄은 바다 앞에서 한참을 울었습니다.",
            sub: "바다는 보았지만 슬픈 이별이 남았습니다.",
            imagePrompt: "A small penguin standing alone on a silent beach looking at the vast dark sea, sad but beautiful artistic style",
            choices: [{ text: "다시 시작하기", next: "startGame" }],
            progress: 100,
            isEnding: true
        },
        "true_ending": {
            text: "어린 펭귄이 바다에 첫 발을 내딛습니다. 당신의 밤은 길었지만, 이제 눈부신 아침이 시작됩니다.",
            sub: "노든의 긴긴밤이 비로소 마침표를 찍습니다.",
            imagePrompt: "A tiny penguin walking toward a sparkling blue sea under a beautiful warm morning sun, hopeful, vibrant, wide landscape shot",
            choices: [{ text: "처음으로 돌아가기", next: "startGame" }],
            progress: 100,
            isEnding: true,
            isTrue: true
        }
    };

    const storyTextEl = document.getElementById('story-text');
    const subTextEl = document.getElementById('sub-text');
    const choicesEl = document.getElementById('choices');
    const progressBar = document.getElementById('progress-bar');
    const progressWrapper = document.getElementById('progress-wrapper');
    const gameContainer = document.getElementById('game-container');
    const sceneImg = document.getElementById('scene-img');
    const spinner = document.getElementById('spinner');
    const coverSection = document.getElementById('cover-section');

    async function generateImage(prompt) {
        spinner.style.display = 'block';
        sceneImg.classList.remove('loaded');
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    instances: [{ prompt: prompt }],
                    parameters: { sampleCount: 1 }
                })
            });
            
            if (!response.ok) throw new Error('API Error');
            
            const result = await response.json();
            const base64 = result.predictions[0].bytesBase64Encoded;
            sceneImg.src = `data:image/png;base64,${base64}`;
            sceneImg.onload = () => {
                spinner.style.display = 'none';
                sceneImg.classList.add('loaded');
            };
        } catch (error) {
            console.error("Image generation failed:", error);
            spinner.style.display = 'none';
        }
    }

    function createStars() {
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }
    }

    function startGame() {
        coverSection.style.display = 'none';
        progressWrapper.style.display = 'block';
        updateScene('start');
    }

    function updateScene(sceneKey) {
        if (sceneKey === 'startGame') {
            location.reload(); 
            return;
        }

        const scene = storyData[sceneKey];
        gameContainer.style.opacity = '0';
        
        setTimeout(() => {
            progressBar.style.width = scene.progress + '%';
            
            if (scene.isTrue) {
                storyTextEl.innerHTML = `<div>${scene.text}<br><span class="core-phrase">"나로 살기로 했다"</span></div>`;
            } else {
                storyTextEl.innerText = scene.text;
            }
            
            subTextEl.innerText = scene.sub || "";
            
            choicesEl.innerHTML = '';
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.innerText = choice.text;
                btn.onclick = () => updateScene(choice.next);
                choicesEl.appendChild(btn);
            });
            
            gameContainer.style.opacity = '1';
            
            if (scene.imagePrompt) {
                generateImage(scene.imagePrompt);
            }
        }, 600);
    }

    window.onload = () => {
        createStars();
        // 수정된 표지 이미지 프롬프트: 클로즈업 샷으로 발을 배제하고 머리를 맞댄 모습에 집중
        generateImage("Extreme close-up, a kind white rhinoceros face and a small penguin touching their heads together lovingly, eyes closed in peace, focus only on their heads, NO LEGS visible, starry night sky backdrop, warm emotional lighting, soft artistic digital painting");
    };
</script>

</body>
</html>

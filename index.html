<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노든의 이야기 — 긴긴밤 어드벤처</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700&display=swap');

:root {
  --night: #0d1117;
  --deep: #161b27;
  --card: #1e2535;
  --border: #2e3a50;
  --accent: #c8a96e;
  --accent2: #7eb8c9;
  --text: #e8dfc8;
  --muted: #8a9ab5;
  --bad: #7a3030;
  --good: #2a5a4a;
  --bad-text: #e8a0a0;
  --good-text: #90d4b8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--night);
  color: var(--text);
  font-family: 'Nanum Myeongjo', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 별 배경 */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(1px 1px at 10% 15%, rgba(200,169,110,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 30%, rgba(200,169,110,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 60%, rgba(200,169,110,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 33% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 75%, rgba(200,169,110,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 78% 88%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);
}

/* ── 화면 공통 ── */
.screen {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem 1rem;
}
.screen.hidden { display: none; }

/* ── 타이틀 ── */
#screen-title {
  text-align: center;
  background: radial-gradient(ellipse at 50% 40%, #1a2540 0%, var(--night) 70%);
}
.title-art { margin-bottom: 2rem; }
.title-main {
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.05em;
  line-height: 1.2;
  text-shadow: 0 0 60px rgba(200,169,110,0.3);
}
.title-sub {
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  color: var(--accent2);
  margin-top: 0.5rem;
  letter-spacing: 0.15em;
  font-weight: 400;
}
.title-desc {
  max-width: 480px;
  margin: 2rem auto;
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.9;
  font-family: 'Nanum Gothic', sans-serif;
}
.btn-start {
  background: transparent;
  border: 1.5px solid var(--accent);
  color: var(--accent);
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1.1rem;
  padding: 0.9rem 3rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.3s;
  margin-top: 1rem;
}
.btn-start:hover {
  background: var(--accent);
  color: var(--night);
}

/* ── 챕터 화면 ── */
#screen-chapter {
  justify-content: flex-start;
  padding-top: 1.5rem;
}
.chapter-inner {
  width: 100%; max-width: 720px;
  display: flex; flex-direction: column;
  gap: 0;
}

/* 진행 바 */
.progress-bar {
  display: flex; gap: 4px;
  margin-bottom: 1.5rem;
  padding: 0 0.5rem;
}
.progress-dot {
  flex: 1; height: 3px;
  background: var(--border);
  border-radius: 2px;
  transition: background 0.4s;
}
.progress-dot.done { background: var(--accent); }
.progress-dot.current { background: var(--accent2); }

/* 챕터 헤더 */
.chapter-header {
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 1.2rem;
  padding: 0 0.5rem;
}
.chapter-num {
  font-size: 0.78rem;
  color: var(--accent2);
  letter-spacing: 0.2em;
  font-family: 'Nanum Gothic', sans-serif;
  white-space: nowrap;
}
.chapter-pov {
  font-size: 0.78rem;
  color: var(--muted);
  font-family: 'Nanum Gothic', sans-serif;
  border: 1px solid var(--border);
  padding: 2px 10px;
  border-radius: 20px;
}

/* 이미지 */
.chapter-image {
  width: 100%;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 1.4rem;
  border: 1px solid var(--border);
}
.chapter-image svg { display: block; width: 100%; height: auto; }

/* 텍스트 영역 */
.chapter-title {
  font-size: clamp(1.4rem, 3.5vw, 2rem);
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.4rem;
  padding: 0 0.5rem;
}
.chapter-quote {
  font-size: 0.95rem;
  color: var(--accent);
  font-style: italic;
  margin-bottom: 1.4rem;
  padding: 0 0.5rem;
  line-height: 1.7;
}
.chapter-text {
  font-size: 1rem;
  line-height: 2;
  color: var(--text);
  padding: 0 0.5rem;
  margin-bottom: 1.8rem;
  font-family: 'Nanum Gothic', sans-serif;
}
.chapter-text .dialogue {
  color: var(--accent2);
  font-style: italic;
}

/* 선택지 */
.choices-label {
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  margin-bottom: 0.8rem;
  padding: 0 0.5rem;
  font-family: 'Nanum Gothic', sans-serif;
}
.choices { display: flex; flex-direction: column; gap: 0.7rem; padding: 0 0.5rem 2rem; }
.choice-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1rem 1.2rem;
  text-align: left;
  cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif;
  font-size: 0.97rem;
  color: var(--text);
  line-height: 1.7;
  transition: all 0.25s;
  display: flex; gap: 0.8rem; align-items: flex-start;
}
.choice-btn:hover { border-color: var(--accent2); background: #253045; transform: translateX(4px); }
.choice-key {
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
  font-size: 0.9rem;
  margin-top: 2px;
}

/* 서사 챕터 (선택지 없음) */
.btn-next {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1rem;
  padding: 0.75rem 2.5rem;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.3s;
  margin: 0 0.5rem 2rem;
  align-self: flex-start;
}
.btn-next:hover { background: var(--accent); color: var(--night); }

/* ── 엔딩 화면 ── */
#screen-ending { text-align: center; }
.ending-badge {
  font-size: 0.8rem;
  letter-spacing: 0.25em;
  padding: 4px 16px;
  border-radius: 20px;
  margin-bottom: 1.5rem;
  font-family: 'Nanum Gothic', sans-serif;
}
.ending-badge.bad { background: var(--bad); color: var(--bad-text); }
.ending-badge.good { background: var(--good); color: var(--good-text); }
.ending-title {
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  font-weight: 800;
  margin-bottom: 1rem;
  line-height: 1.3;
}
.ending-title.bad { color: var(--bad-text); }
.ending-title.good { color: var(--good-text); }
.ending-image {
  max-width: 560px; width: 100%;
  border-radius: 8px; overflow: hidden;
  margin: 1.5rem auto;
  border: 1px solid var(--border);
}
.ending-image svg { display: block; width: 100%; height: auto; }
.ending-text {
  max-width: 520px;
  margin: 0 auto 2rem;
  font-size: 1.05rem;
  line-height: 2;
  color: var(--text);
  font-style: italic;
  white-space: pre-line;
}
.ending-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn-retry, .btn-home {
  padding: 0.75rem 2rem;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1rem;
  letter-spacing: 0.05em;
  transition: all 0.25s;
}
.btn-retry { background: var(--accent); color: var(--night); border: none; }
.btn-retry:hover { opacity: 0.85; }
.btn-home { background: transparent; border: 1px solid var(--muted); color: var(--muted); }
.btn-home:hover { border-color: var(--text); color: var(--text); }

.credit-text {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  font-family: 'Nanum Gothic', sans-serif;
  margin-top: 1.2rem;
  opacity: 0.7;
}

/* 페이드 */
.fade-in { animation: fadeIn 0.6s ease; }
@keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>

// 게임 로직
// ══════════════════════════════════════
const chapterMap = {};
CHAPTERS.forEach(c => { chapterMap[`ch${c.id}`] = c; });

function startGame() {
  showChapter("ch1");
}

function showChapter(id) {
  const ch = chapterMap[id];
  if (!ch) { showEnding(id); return; }

  document.getElementById("screen-title").classList.add("hidden");
  document.getElementById("screen-ending").classList.add("hidden");
  document.getElementById("screen-chapter").classList.remove("hidden");

  const progress = CHAPTERS.map((c, i) => {
    const cls = c.id < ch.id ? "done" : c.id === ch.id ? "current" : "";
    return `<div class="progress-dot ${cls}"></div>`;
  }).join("");

  const choicesHtml = ch.choices
    ? `<div class="choices-label">— 선택 —</div>
       <div class="choices">
         ${ch.choices.map((c, i) => `
           <button class="choice-btn" onclick="handleChoice('${c.next}')">
             <span class="choice-key">${String.fromCharCode(65+i)}.</span>
             <span>${c.text}</span>
           </button>`).join("")}
       </div>`
    : `<button class="btn-next" onclick="handleChoice('${ch.nextNarrative}')">계속 →</button>`;

  const textHtml = ch.text.split('\n').map(line =>
    line.trim() ? `<p>${line}</p>` : '<p style="height:0.5rem"></p>'
  ).join('');

  document.getElementById("chapter-inner").innerHTML = `
    <div class="progress-bar">${progress}</div>
    <div class="chapter-header">
      <span class="chapter-num">CHAPTER ${ch.id}</span>
      <span class="chapter-pov">${ch.pov}</span>
    </div>
    <div class="chapter-image">${IMAGES[ch.image]}</div>
    <h2 class="chapter-title">${ch.title}</h2>
    <p class="chapter-quote">${ch.quote}</p>
    <div class="chapter-text">${textHtml}</div>
    ${choicesHtml}
  `;

  document.getElementById("chapter-inner").classList.remove("fade-in");
  void document.getElementById("chapter-inner").offsetWidth;
  document.getElementById("chapter-inner").classList.add("fade-in");
  window.scrollTo(0, 0);
}

function handleChoice(next) {
  if (next.startsWith("ch")) { showChapter(next); }
  else { showEnding(next); }
}

function showEnding(id) {
  const e = ENDINGS[id];
  if (!e) return;

  document.getElementById("screen-chapter").classList.add("hidden");
  document.getElementById("screen-title").classList.add("hidden");
  document.getElementById("screen-ending").classList.remove("hidden");

  const textHtml = e.text.split('\n').map(line =>
    line.trim() ? `<p>${line}</p>` : '<p style="height:0.5rem"></p>'
  ).join('');

  document.getElementById("ending-inner").innerHTML = `
    <div class="ending-badge ${e.type}">${e.badge}</div>
    <h2 class="ending-title ${e.type}">${e.title}</h2>
    <div class="ending-image">${IMAGES[e.image]}</div>
    <div class="ending-text">${textHtml}</div>
    <div class="ending-buttons">
      <button class="btn-retry" onclick="startGame()">처음부터 다시</button>
      <button class="btn-home" onclick="goHome()">타이틀로</button>
    </div>
    <p class="credit-text" style="margin-top:1.5rem;">북평여자고등학교 사서교사 이미혜 제작</p>
  `;

  document.getElementById("ending-inner").classList.remove("fade-in");
  void document.getElementById("ending-inner").offsetWidth;
  document.getElementById("ending-inner").classList.add("fade-in");
  window.scrollTo(0, 0);
}

function goHome() {
  document.getElementById("screen-chapter").classList.add("hidden");
  document.getElementById("screen-ending").classList.add("hidden");
  document.getElementById("screen-title").classList.remove("hidden");
  window.scrollTo(0, 0);
}
</script>
